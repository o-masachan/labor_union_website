<!-- login.html -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ログイン</title>
</head>
<body>

<h2>組合員ログイン</h2>

<input type="text" id="user" placeholder="ID"><br>
<input type="password" id="pass" placeholder="パスワード"><br>
<button onclick="login()">ログイン</button>

<script>
function login() {
  const user = document.getElementById("user").value;
  const pass = document.getElementById("pass").value;

  if(user === "union" && pass === "1234"){
    window.location.href = "member.html";
  } else {
    alert("IDまたはパスワードが違います");
  }
}
</script>

</body>
</html>
